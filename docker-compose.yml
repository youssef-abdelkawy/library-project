version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB=librarydb
      POSTGRES_USER=admin
      POSTGRES_PASSWORD=admin
    ports:
      - "5432:5432"
